<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastrar TV - PromoUp</title>
  <script src="config.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header"><h1>PromoUp</h1><p>Sistema de Gestão</p></div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>Dashboard</a>
        <a href="firebird.html" class="nav-item"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7c-2 0-3 1-3 3z"/></svg>Configuração Firebird</a>
        <a href="tvs.html" class="nav-item"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>Televisões</a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <button onclick="window.location.href='tvs.html'" class="btn btn-secondary mb-4">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Voltar
        </button>
        <h1><span id="wizard-title">Cadastrar Nova TV</span></h1>
        <p id="wizard-subtitle">Preencha as informações da televisão</p>
      </div>

      <div class="card" style="max-width: 800px;">
        <form id="tvForm">
          <div class="form-group">
            <label class="form-label">Nome da TV *</label>
            <input type="text" id="nome" class="form-input" placeholder="Ex: TV Açougue" required>
          </div>

          <div class="form-group">
            <label class="form-label">Rota de Acesso *</label>
            <div class="flex items-center gap-4">
              <span style="color: #64748B; font-family: monospace; font-size: 14px;">localhost:9090/display.html?tv=</span>
              <input type="text" id="route_path" class="form-input font-mono" placeholder="tvsala" required style="flex: 1;">
            </div>
            <p style="font-size: 12px; color: #94A3B8; margin-top: 4px;">Apenas letras minúsculas sem espaços</p>
          </div>

          <div class="form-group">
            <label class="form-label">Tipo de Filtro</label>
            <select id="filtro_tipo" class="form-input">
              <option value="nenhum">Nenhum (Mostrar todos)</option>
              <option value="promocao">Por Promoção</option>
              <option value="categoria">Por Categoria</option>
              <option value="produto">Por Produto</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Cor de Fundo</label>
            <input type="color" id="cor_fundo" class="form-input" value="#FFFFFF" style="width: 100px;">
          </div>

          <div class="flex gap-4 mt-8">
            <button type="submit" class="btn btn-primary">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              <span id="btn-save-text">Salvar TV</span>
            </button>
            <button type="button" onclick="window.location.href='tvs.html'" class="btn btn-secondary">Cancelar</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="js/wizard.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromoUp - Produtos</title>
  <script src="config.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>PromoUp</h1>
        <p>Sistema de Gestão</p>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Dashboard
        </a>
        <a href="firebird.html" class="nav-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7c-2 0-3 1-3 3z"/></svg>
          Configuração Firebird
        </a>
        <a href="tvs.html" class="nav-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Televisões
        </a>
        <a href="produtos.html" class="nav-item active">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          Produtos do Cardápio
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <div class="page-header" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <h1>Produtos do ERP</h1>
          <p>Selecione quais produtos irão aparecer nas TVs</p>
        </div>
        
        <div style="display: flex; gap: 12px;">
          <button onclick="sincronizarERP()" class="btn btn-secondary" id="btn-sync" style="background-color: #64748B; color: white;">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
            BUSCAR
          </button>
          
          <button onclick="salvarSelecao()" class="btn btn-primary" id="btn-salvar">
            <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
            Salvar Produtos Selecionados
          </button>
        </div>
      </div>

      <div class="card" style="margin-bottom: 20px;">
        <input type="text" id="buscaProduto" class="form-input" placeholder="Buscar produto pelo nome..." onkeyup="filtrarTabela()">
      </div>

      <div class="card" style="padding: 0; overflow: hidden;">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
          <thead style="background-color: #f8fafc; border-bottom: 1px solid #e2e8f0;">
            <tr>
              <th style="padding: 12px 16px; width: 50px;">
                <input type="checkbox" id="checkTodos" onchange="marcarTodos(this)" style="cursor: pointer;">
              </th>
              <th style="padding: 12px 16px; font-weight: 600;">Foto</th>
              <th style="padding: 12px 16px; font-weight: 600;">ID</th>
              <th style="padding: 12px 16px; font-weight: 600;">Descrição do Produto</th>
              <th style="padding: 12px 16px; font-weight: 600; text-align: right;">Preço de Venda</th>
            </tr>
          </thead>
          <tbody id="tabela-produtos">
            <tr>
              <td colspan="5" style="padding: 20px; text-align: center; color: #64748B;">
                Aguardando... Clique no botão "BUSCAR" acima para carregar do Firebird.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="js/produtos.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Configuração Firebird - PromoUp</title>
  <script src="config.js"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>PromoUp</h1>
        <p>Sistema de Gestão</p>
      </div>
      <nav class="sidebar-nav">
        <a href="index.html" class="nav-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          Dashboard
        </a>
        <a href="firebird.html" class="nav-item active">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7c-2 0-3 1-3 3z"/></svg>
          Configuração Firebird
        </a>
        <a href="tvs.html" class="nav-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
          Televisões
        </a>
        <a href="produtos.html" class="nav-item">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          Produtos do Cardápio
        </a>
      </nav>
      <div class="sidebar-footer">
        <button class="nav-item w-full" onclick="window.close()">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          Sair
        </button>
      </div>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <button onclick="window.location.href='index.html'" class="btn btn-secondary" style="margin-bottom: 16px;">
          <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          Voltar
        </button>
        <h1>Configuração Firebird</h1>
        <p>Configure a conexão com o banco de dados Firebird</p>
      </div>

      <div class="card" style="max-width: 800px;">
        <form id="firebirdForm">
          <div class="form-group">
            <label class="form-label">Caminho do Banco de Dados</label>
            <div class="flex gap-2">
              <input type="text" id="caminho_banco" class="form-input font-mono" placeholder="C:\DB\DATABASE.FDB" required style="flex: 1;">
              <button type="button" class="btn btn-secondary" onclick="browseDatabase()" title="Procurar arquivo">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Porta</label>
            <input type="number" id="porta" class="form-input" value="3055" required>
          </div>

          <div class="form-group">
            <label class="form-label">Caminho da DLL (fbclient.dll)</label>
            <div class="flex gap-2">
              <input type="text" id="dll_path" class="form-input font-mono" placeholder="C:\FBClient\fbclient.dll" style="flex: 1;">
              <button type="button" class="btn btn-secondary" onclick="browseDll()" title="Procurar arquivo">
                <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"></path></svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Usuário</label>
            <input type="text" id="user" class="form-input" value="SYSDBA" placeholder="SYSDBA">
          </div>

          <div class="form-group">
            <label class="form-label">Senha</label>
            <input type="password" id="password" class="form-input" placeholder="masterkey">
          </div>

          <div class="flex gap-4">
            <button type="button" id="btnTestConnection" class="btn btn-success" onclick="testConnection()">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
              Testar Conexão
            </button>
            <button type="submit" class="btn btn-primary">
              <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
              Salvar Configuração
            </button>
            <button type="button" onclick="window.location.href='index.html'" class="btn btn-secondary">Cancelar</button>
          </div>
        </form>
      </div>
    </main>
  </div>

  <script src="js/firebird.js"></script>
</body>
</html>
